{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'movies/css/style.css' %}" rel="stylesheet">
    <title>Autor: {{ director.name }}</title>
</head>
<body>
    <p><strong>Director:</strong> {{ director.name }}</p>
    <p><strong>Birth Date:</strong> {{ director.birth_date }}</p>

    <h3>Películas:</h3>
    <ul>
        {% for movie in movies %}
            <li>{{ movie.title }} ({{ movie.release_year }})</li>
        {% endfor %}
    </ul>
</body>
</html>
