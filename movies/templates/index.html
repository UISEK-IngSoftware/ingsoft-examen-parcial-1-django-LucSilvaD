{% extends 'base.html' %}

{% block title %}Inicio - Películas{% endblock %}

{% block content %}
    <h2>Listado de Películas</h2>
    <ul>
        {% for movie in movies %}
            <li>
                <a href="{% url 'movie_detail' movie.id %}">{{ movie.title }} - {{ movie.release_year }}</a>
            </li>
        {% empty %}
            <li>No hay películas registradas.</li>
        {% endfor %}
    </ul>
{% endblock %}
